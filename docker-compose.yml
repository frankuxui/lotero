services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - apps/api/.env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 4031
      DATABASE_URL: file:./data/lotero.db
    ports:
      - "${API_PORT:-4031}:4031"
    volumes:
      - ./apps/api/data:/app/apps/api/data
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4031/api}
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-5173}:80"
    restart: unless-stopped
