services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - apps/api/.env
    ports:
      - "${API_PORT:-4031}:4031"
    volumes:
      - ./apps/api/data:/app/apps/api/data
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: "${VITE_API_URL}"
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-5173}:80"
    restart: unless-stopped